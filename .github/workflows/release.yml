name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

# Cancel superseded runs on the same ref (e.g. new push to a PR branch).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Workaround for transient "Error in the HTTP2 framing layer" failures
  # when cargo fetches crates from the sparse registry on Windows runners.
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  # ── CI: build + test on every push to main (gates the release) ─────────────
  test:
    name: Test — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libegl1-mesa-dev \
            libfontconfig1-dev pkg-config
      - name: Build
        run: cargo build --all-targets
      - name: Test
        run: cargo test --all-targets

  # ── Check the version in Cargo.toml is new (fails if not bumped) ───────────
  check-version:
    name: Check version
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"
      - name: Require a bumped version
        run: |
          if git tag | grep -qx "v${{ steps.version.outputs.version }}"; then
            echo "::error::Version v${{ steps.version.outputs.version }} already released — bump 'version' in Cargo.toml."
            exit 1
          fi
          echo "Version v${{ steps.version.outputs.version }} is new — proceeding."

  # ── Build on all three platforms ───────────────────────────────────────────
  build:
    name: Build — ${{ matrix.os }}
    needs: [test, check-version]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            asset: llaunchpad-macos-universal.tar.gz
          - os: ubuntu-latest
            asset: llaunchpad-linux-x86_64.tar.gz
          - os: windows-latest
            asset: llaunchpad-windows-x86_64.zip
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      # ── macOS: universal .app ────────────────────────────────────────────
      - name: macOS targets
        if: matrix.os == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin
      - name: Build macOS universal
        if: matrix.os == 'macos-latest'
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin
          mkdir -p target/release
          lipo -create -output target/release/llaunchpad \
            target/x86_64-apple-darwin/release/llaunchpad \
            target/aarch64-apple-darwin/release/llaunchpad
      - name: Assemble & package macOS .app
        if: matrix.os == 'macos-latest'
        run: |
          ./bundle.sh
          tar czf llaunchpad-macos-universal.tar.gz Llaunchpad.app

      # ── Linux ─────────────────────────────────────────────────────────────
      - name: Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libegl1-mesa-dev \
            libfontconfig1-dev pkg-config
      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: cargo build --release
      - name: Package Linux
        if: matrix.os == 'ubuntu-latest'
        run: tar czf llaunchpad-linux-x86_64.tar.gz -C target/release llaunchpad

      # ── Windows ───────────────────────────────────────────────────────────
      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: cargo build --release
      - name: Package Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path target/release/llaunchpad.exe -DestinationPath llaunchpad-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 1

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            llaunchpad-macos-universal.tar.gz
            llaunchpad-linux-x86_64.tar.gz
            llaunchpad-windows-x86_64.zip

  # ── Update Homebrew tap (macOS) ────────────────────────────────────────────
  update-tap:
    name: Update Homebrew tap
    needs: [check-version, release]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "v${{ needs.check-version.outputs.version }}" \
            --repo draugvar/llaunchpad --pattern "llaunchpad-macos-universal.tar.gz"
      - name: Compute SHA256
        id: sha256
        run: echo "value=$(shasum -a 256 llaunchpad-macos-universal.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
      - name: Update tap formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
          SHA256: ${{ steps.sha256.outputs.value }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/draugvar/homebrew-llaunchpad.git" tap
          mkdir -p tap/Casks
          {
            echo 'cask "llaunchpad" do'
            echo "  version \"${VERSION}\""
            echo "  sha256 \"${SHA256}\""
            echo ''
            echo '  url "https://github.com/draugvar/llaunchpad/releases/download/v#{version}/llaunchpad-macos-universal.tar.gz"'
            echo '  name "Llaunchpad"'
            echo '  desc "Native launcher for Ollama coding agents with cloud models"'
            echo '  homepage "https://github.com/draugvar/llaunchpad"'
            echo ''
            echo '  app "Llaunchpad.app"'
            echo ''
            echo '  postflight do'
            echo '    system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{appdir}/Llaunchpad.app"]'
            echo '  end'
            echo ''
            echo '  zap trash: ['
            echo '    "~/Library/Application Support/Llaunchpad",'
            echo '  ]'
            echo 'end'
          } > tap/Casks/llaunchpad.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/llaunchpad.rb
          git diff --cached --quiet || git commit -m "Update llaunchpad to v${VERSION}"
          git push

  cleanup:
    name: Delete artifacts
    needs: [release, update-tap]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: geekyeggo/delete-artifact@v6
        with:
          name: |
            llaunchpad-macos-universal.tar.gz
            llaunchpad-linux-x86_64.tar.gz
            llaunchpad-windows-x86_64.zip
          failOnError: false
